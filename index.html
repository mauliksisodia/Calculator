<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Simple Calculator</title>
</head>
<body>
    <div class="calc-container">
        <div class="display">
            <input type="text" id="result" readonly placeholder="0" disabled>
        </div>
    <div class="buttons">
         <button onclick="appendFunction('7')">7</button>
      <button onclick="appendFunction('8')">8</button>
      <button onclick="appendFunction('9')">9</button>
      <button onclick="appendFunction('*')">×</button>

      <button onclick="appendFunction('4')">4</button>
      <button onclick="appendFunction('5')">5</button>
      <button onclick="appendFunction('6')">6</button>
      <button onclick="appendFunction('-')">-</button>

      <button onclick="appendFunction('1')">1</button>
      <button onclick="appendFunction('2')">2</button>
      <button onclick="appendFunction('3')">3</button>
      <button onclick="appendFunction('+')">+</button>

      <button onclick="appendFunction('0')">0</button>
      <button onclick="appendFunction('.')">.</button>
      <button onclick="clearDisplay()" id="clear">C</button>
      <button onclick="deleteLast()" id="delete">⌫</button>
      <button onclick="calculate()" id="equals" class="equal-btn">=</button>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
